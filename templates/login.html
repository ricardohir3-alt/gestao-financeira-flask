{% extends "base.html" %}

{% block content %}
    <div class="flex flex-col items-center justify-center min-h-[80vh] p-4">

        <div class="w-full max-w-sm bg-white dark:bg-gray-800 p-8 rounded-3xl shadow-2xl border border-gray-100 dark:border-gray-700">

            <div class="text-center mb-8">
                <div class="flex justify-center mb-4">
                    <img src="{{ url_for('static', filename='icone_app.png') }}"
                         alt="Minhas Finanças Logo"
                         class="w-20 h-20 rounded-2xl shadow-xl border border-gray-100 dark:border-gray-700">
                </div>
                <h1 class="text-2xl font-black text-gray-800 dark:text-gray-100">Minhas Finanças</h1>
            </div>

            {% if erro %}
            <div class="bg-red-50 dark:bg-red-950/40 border border-red-200 dark:border-red-800 text-red-600 dark:text-red-400 text-xs px-3 py-2.5 rounded-lg mb-4 flex items-center gap-2 font-medium">
                <i data-lucide="alert-circle" class="w-4 h-4 shrink-0"></i> {{ erro }}
            </div>
            {% endif %}

            <form action="/login" method="POST" class="space-y-5">
                <!-- Campo: Usuário -->
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 dark:text-gray-500 uppercase tracking-widest mb-1.5 ml-1">Usuário</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="user" class="w-4 h-4 text-gray-400"></i>
                        </div>
                        <input type="text" name="usuario" placeholder="Seu usuário" required
                               class="w-full pl-10 pr-3 py-3.5 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-2xl text-sm text-gray-800 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                    </div>
                </div>

                <!-- Campo: Senha com sub-opções -->
                <div class="space-y-3">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 dark:text-gray-500 uppercase tracking-widest mb-1.5 ml-1">Senha</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i data-lucide="lock" class="w-4 h-4 text-gray-400"></i>
                            </div>
                            <!-- Adicionado pr-12 para o texto não sobrepor o botão do olhinho -->
                            <input type="password" id="senha" name="senha" placeholder="••••••••" required
                                   class="w-full pl-10 pr-12 py-3.5 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-2xl text-sm text-gray-800 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                            
                            <!-- Botão do Olhinho -->
                            <button type="button" onclick="togglePassword()" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-blue-500 dark:hover:text-blue-400 focus:outline-none transition-colors">
                                <i data-lucide="eye" id="eye-icon" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Opções: Manter conectado & Esqueceu a senha -->
                    <div class="flex items-center justify-between px-1">
                        <div class="flex items-center">
                            <input type="checkbox" id="lembrar" name="lembrar" 
                                   class="w-4 h-4 text-blue-600 bg-gray-50 border-gray-300 rounded focus:ring-blue-500 dark:focus:ring-blue-600 dark:ring-offset-gray-900 focus:ring-2 dark:bg-gray-800 dark:border-gray-600 cursor-pointer">
                            <label for="lembrar" class="ml-2 text-[11px] font-medium text-gray-500 dark:text-gray-400 cursor-pointer">Manter conectado</label>
                        </div>
                        <a href="/recuperar_senha" class="text-[11px] font-bold text-blue-600 hover:text-blue-500 dark:text-blue-400 dark:hover:text-blue-300 transition-colors">
                            Esqueceu a senha?
                        </a>
                    </div>
                </div>

                <!-- Botão de Submit -->
                <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-blue-500/20 flex justify-center items-center gap-2 mt-2">
                    Entrar no App <i data-lucide="log-in" class="w-4 h-4"></i>
                </button>
            </form>

            <div class="flex items-center gap-4 my-8">
                <div class="flex-grow border-t border-gray-200 dark:border-gray-700"></div>
                <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Instalar como App</span>
                <div class="flex-grow border-t border-gray-200 dark:border-gray-700"></div>
            </div>

            <div class="text-[11px] text-gray-500 dark:text-gray-400 space-y-2 text-center">
                <p><strong>iOS:</strong> Compartilhar <i data-lucide="share" class="inline w-3 h-3"></i> → Adicionar à Tela de Início</p>
                <p><strong>Android:</strong> Menu <i data-lucide="more-vertical" class="inline w-3 h-3"></i> → Instalar App / Adicionar à Tela Inicial</p>
            </div>

        </div>
    </div>

    <a href="https://wa.me/5586998168447?text=Olá%20hir3!%20Estou%20na%20tela%20de%20login%20e%20preciso%20de%20ajuda%20para%20acessar."
       target="_blank"
       class="fixed bottom-6 right-6 z-[60] bg-gray-900/95 dark:bg-white/95 backdrop-blur-md text-green-400 dark:text-green-600 p-3.5 rounded-full shadow-[0_8px_30px_rgba(0,0,0,0.3)] hover:scale-105 active:scale-95 transition-all flex items-center justify-center border border-gray-700 dark:border-gray-200 group">

        <i data-lucide="bot" class="w-6 h-6"></i>

        <span class="absolute top-0 right-0 flex h-3 w-3">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
        </span>

        <span class="absolute right-14 bg-gray-900 dark:bg-gray-100 text-white dark:text-gray-900 text-xs font-bold px-3 py-2 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none md:block hidden shadow-lg border border-gray-700 dark:border-gray-200">
            Falar com o hir3 (IA)
        </span>
    </a>

    <script>
        lucide.createIcons();

        // Script para alternar a visibilidade da senha
        function togglePassword() {
            const passwordInput = document.getElementById('senha');
            const eyeIcon = document.getElementById('eye-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                // Remove o ícone antigo e cria o novo de 'olho fechado'
                eyeIcon.setAttribute('data-lucide', 'eye-off');
            } else {
                passwordInput.type = 'password';
                // Retorna para o ícone de 'olho aberto'
                eyeIcon.setAttribute('data-lucide', 'eye');
            }
            // Recarrega os ícones Lucide para aplicar a mudança
            lucide.createIcons();
        }
    </script>
{% endblock %}
