{% extends "base.html" %}

{% block content %}
    <!-- Botão Voltar -->
    <a href="javascript:history.back()" class="flex items-center gap-1 text-gray-500 hover:text-blue-600 dark:text-gray-400 dark:hover:text-blue-400 mb-4 transition-colors text-sm font-medium">
        <i data-lucide="arrow-left" class="w-4 h-4"></i>
        <span>Voltar</span>
    </a>

    <h2 class="text-xl font-bold mb-6 text-gray-800 dark:text-gray-200 flex items-center gap-2">
        <i data-lucide="refresh-cw" class="w-6 h-6 text-blue-600 dark:text-blue-400"></i> Duplicar Gastos Mensais
    </h2>

    <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700">
        
        <div class="bg-yellow-50 dark:bg-yellow-900/30 border-l-4 border-yellow-400 p-4 mb-6 rounded-r-lg flex gap-3">
            <i data-lucide="alert-triangle" class="w-5 h-5 text-yellow-600 dark:text-yellow-400 shrink-0"></i>
            <p class="text-sm text-yellow-800 dark:text-yellow-200">
                <strong>Atenção:</strong> Esta ação copiará todas as contas do "Mês de Origem" para o "Mês de Destino". Todas as contas copiadas entrarão com o status de <strong>⏳ Pendente</strong> no novo mês.
            </p>
        </div>

        <form action="/duplicar" method="POST">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <div class="bg-gray-50 dark:bg-gray-900 p-4 rounded-lg border border-gray-200 dark:border-gray-600">
                    <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2 flex items-center gap-2">
                        <i data-lucide="upload" class="w-4 h-4"></i> Mês de Origem (Copiar de)
                    </label>
                    <input type="month" name="mes_origem" required 
                           class="w-full px-4 py-2.5 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-500 rounded-lg text-gray-800 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div class="bg-blue-50 dark:bg-blue-900/20 p-4 rounded-lg border border-blue-200 dark:border-blue-800">
                    <label class="block text-sm font-bold text-blue-700 dark:text-blue-300 mb-2 flex items-center gap-2">
                        <i data-lucide="download" class="w-4 h-4"></i> Mês de Destino (Colar em)
                    </label>
                    <input type="month" name="mes_destino" required 
                           class="w-full px-4 py-2.5 bg-white dark:bg-gray-800 border border-blue-300 dark:border-blue-600 rounded-lg text-gray-800 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-700 transition duration-200 shadow-md flex items-center justify-center gap-2">
                <i data-lucide="copy" class="w-5 h-5"></i> Executar Duplicação
            </button>
        </form>
    </div>

    <script>
        // Garante que os ícones sejam renderizados ao carregar a página
        lucide.createIcons();
    </script>
{% endblock %}
