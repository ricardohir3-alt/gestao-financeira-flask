{% extends "base.html" %}

{% block content %}
<div class="w-full max-w-sm mx-auto">
    <!-- Botão Voltar -->
    <a href="javascript:history.back()" class="flex items-center gap-1 text-gray-500 hover:text-blue-600 dark:text-gray-400 dark:hover:text-blue-400 mb-4 transition-colors text-sm font-medium">
        <i data-lucide="arrow-left" class="w-4 h-4"></i>
        <span>Voltar</span>
    </a>

    <h2 class="text-xl font-bold mb-4 text-gray-800 dark:text-gray-200 flex items-center gap-2">
        <i data-lucide="calculator" class="w-5 h-5 text-blue-600 dark:text-blue-400"></i> Calculadora
    </h2>

    <!-- Visor -->
    <div class="bg-gray-100 dark:bg-gray-900 p-4 rounded-xl mb-4 text-right border border-gray-200 dark:border-gray-700">
        <div id="historico" class="text-gray-500 dark:text-gray-400 text-sm h-5 font-mono truncate"></div>
        <div id="visor" class="text-gray-800 dark:text-white text-4xl font-light truncate">0</div>
    </div>

    <!-- Teclado -->
    <div class="grid grid-cols-4 gap-2 bg-gray-50 dark:bg-gray-900/30 p-3 rounded-xl border border-gray-200 dark:border-gray-800">
        <button onclick="limpar()" class="col-span-2 bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 font-bold py-3 rounded-lg text-lg">C</button>
        <button onclick="apagar()" class="bg-gray-200 dark:bg-gray-800 text-gray-700 dark:text-gray-200 font-bold py-3 rounded-lg text-lg">⌫</button>
        <button onclick="adicionar('/')" class="bg-blue-600 text-white font-bold py-3 rounded-lg text-lg">÷</button>

        <button onclick="adicionar('7')" class="bg-white dark:bg-gray-800 text-gray-800 dark:text-white py-3 rounded-lg font-medium shadow-sm">7</button>
        <button onclick="adicionar('8')" class="bg-white dark:bg-gray-800 text-gray-800 dark:text-white py-3 rounded-lg font-medium shadow-sm">8</button>
        <button onclick="adicionar('9')" class="bg-white dark:bg-gray-800 text-gray-800 dark:text-white py-3 rounded-lg font-medium shadow-sm">9</button>
        <button onclick="adicionar('*')" class="bg-blue-600 text-white font-bold py-3 rounded-lg text-lg shadow-sm">×</button>

        <button onclick="adicionar('4')" class="bg-white dark:bg-gray-800 text-gray-800 dark:text-white py-3 rounded-lg font-medium shadow-sm">4</button>
        <button onclick="adicionar('5')" class="bg-white dark:bg-gray-800 text-gray-800 dark:text-white py-3 rounded-lg font-medium shadow-sm">5</button>
        <button onclick="adicionar('6')" class="bg-white dark:bg-gray-800 text-gray-800 dark:text-white py-3 rounded-lg font-medium shadow-sm">6</button>
        <button onclick="adicionar('-')" class="bg-blue-600 text-white font-bold py-3 rounded-lg text-lg shadow-sm">-</button>

        <button onclick="adicionar('1')" class="bg-white dark:bg-gray-800 text-gray-800 dark:text-white py-3 rounded-lg font-medium shadow-sm">1</button>
        <button onclick="adicionar('2')" class="bg-white dark:bg-gray-800 text-gray-800 dark:text-white py-3 rounded-lg font-medium shadow-sm">2</button>
        <button onclick="adicionar('3')" class="bg-white dark:bg-gray-800 text-gray-800 dark:text-white py-3 rounded-lg font-medium shadow-sm">3</button>
        <button onclick="adicionar('+')" class="bg-blue-600 text-white font-bold py-3 rounded-lg text-lg shadow-sm">+</button>

        <button onclick="adicionar('0')" class="col-span-2 bg-white dark:bg-gray-800 text-gray-800 dark:text-white py-3 rounded-lg font-medium shadow-sm">0</button>
        <button onclick="adicionar('.')" class="bg-white dark:bg-gray-800 text-gray-800 dark:text-white py-3 rounded-lg font-bold shadow-sm">.</button>
        <button onclick="calcular()" class="bg-green-600 text-white font-bold py-3 rounded-lg text-lg shadow-sm">=</button>
    </div>
</div>

<script>
    // Vincula as funções ao objeto global 'window' para garantir que os botões as encontrem
    window.adicionar = function(valor) {
        const visor = document.getElementById('visor');
        if (visor.innerText === '0' && valor !== '.') {
            visor.innerText = valor;
        } else {
            visor.innerText += valor;
        }
    };

    window.limpar = function() {
        document.getElementById('visor').innerText = '0';
        document.getElementById('historico').innerText = '';
    };

    window.apagar = function() {
        const visor = document.getElementById('visor');
        if (visor.innerText.length > 1) {
            visor.innerText = visor.innerText.slice(0, -1);
        } else {
            visor.innerText = '0';
        }
    };

    window.calcular = function() {
        const visor = document.getElementById('visor');
        const historico = document.getElementById('historico');
        try {
            historico.innerText = visor.innerText + ' =';
            // eval processa a string matemática
            let resultado = eval(visor.innerText);
            visor.innerText = resultado;
        } catch (e) {
            visor.innerText = 'Erro';
            setTimeout(limpar, 1000);
        }
    };
    
    // Recarrega os ícones caso necessário
    lucide.createIcons();
</script>
{% endblock %}
