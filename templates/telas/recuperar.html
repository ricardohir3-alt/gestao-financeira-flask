{% extends "base.html" %}

{% block content %}
<div class="max-w-sm mx-auto mt-8">
    <div class="flex justify-between items-center mb-4">
        <h2 class="text-base font-bold text-gray-700 dark:text-gray-300">Redefinir Senha</h2>
        <a href="/login" class="text-xs text-gray-400 hover:text-gray-600 dark:hover:text-gray-200">&larr; Voltar</a>
    </div>
    
    {% if erro %}
    <div class="bg-red-50 dark:bg-red-950/40 border border-red-200 dark:border-red-900 text-red-600 dark:text-red-400 text-xs px-3 py-2 rounded mb-4">
        {{ erro }}
    </div>
    {% endif %}

    <form action="/recuperar_senha" method="POST" class="bg-white dark:bg-gray-800 p-5 rounded-lg border border-gray-100 dark:border-gray-700 shadow-sm">
        <p class="text-[11px] text-gray-500 dark:text-gray-400 mb-4 leading-relaxed">
            Informe o seu nome de usuário cadastrado, sua senha atual e escolha uma nova combinação de acesso segura.
        </p>

        <div class="mb-3">
            <label class="block text-xs font-semibold text-gray-600 dark:text-gray-400 mb-1">Confirmar Usuário</label>
            <input type="text" name="usuario" placeholder="Ex: admin" required 
                   class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-600 rounded text-xs text-gray-800 dark:text-gray-100 focus:outline-none focus:ring-1 focus:ring-blue-500">
        </div>
        
        <!-- NOVO CAMPO: Senha Atual -->
        <div class="mb-3">
            <label class="block text-xs font-semibold text-gray-600 dark:text-gray-400 mb-1">Senha Atual</label>
            <input type="password" name="senha_atual" placeholder="Digite sua senha atual" required 
                   class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-600 rounded text-xs text-gray-800 dark:text-gray-100 focus:outline-none focus:ring-1 focus:ring-blue-500">
        </div>

        <div class="mb-4">
            <label class="block text-xs font-semibold text-gray-600 dark:text-gray-400 mb-1">Nova Senha</label>
            <input type="password" name="nova_senha" placeholder="Digite a nova senha" required 
                   class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-600 rounded text-xs text-gray-800 dark:text-gray-100 focus:outline-none focus:ring-1 focus:ring-blue-500">
        </div>
        
        <button type="submit" class="w-full bg-blue-600 text-white text-xs font-bold py-2 px-4 rounded hover:bg-blue-700 transition duration-200 shadow-sm">
            Atualizar Credenciais
        </button>
    </form>
</div>
{% endblock %}
